name: medcopilot

services:
  clinical-recommendations:
    build:
      context: .
      dockerfile: clinical-recommendations-service/Dockerfile
    environment:
      APP_ENV: container
      HOST: 0.0.0.0
      PORT: 8002
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      CLINICAL_RECOMMENDATIONS_CSV_PATH: /app/clinical_recommendations/clinical_recommendations.csv
      CLINICAL_RECOMMENDATIONS_PDF_DIR: /app/clinical_recommendations/pdf_files
    volumes:
      - ./clinical_recommendations/pdf_files:/app/clinical_recommendations/pdf_files:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  transcribation:
    build:
      context: ./transcribation
      dockerfile: Dockerfile.cpu
    environment:
      MODEL_PATH: /models/whisper-ct2-ru
      MODEL_KAGGLE_DATASET: danchik575/whisper-ct2-ru
      KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN:-}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      USE_GROQ_API: ${TRANSCRIBATION_USE_GROQ_API:-true}
      GROQ_API_KEY: ${TRANSCRIBATION_GROQ_API_KEY:-}
      GROQ_MODEL: ${TRANSCRIBATION_GROQ_MODEL:-whisper-large-v3-turbo}
      AUDIO_CONTEXT_SECONDS: 10.0
    volumes:
      - transcribation-model:/models
      - ${HOME}/.kaggle:/root/.kaggle:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  fhir:
    build:
      context: ./fhir
    user: "0:0"
    volumes:
      - fhir-data:/data/hapi

  realtime-analysis:
    build:
      context: ./real_time_analysis
    depends_on:
      fhir:
        condition: service_started
    environment:
      LLM_PROVIDER: ${REALTIME_ANALYSIS_LLM_PROVIDER:-ollama}
      MODEL_NAME: ${REALTIME_ANALYSIS_MODEL_NAME:-qwen3:4b}
      LLM_BASE_URL: ${REALTIME_ANALYSIS_LLM_BASE_URL:-http://host.docker.internal:11434}
      FHIR_BASE_URL: ${REALTIME_ANALYSIS_FHIR_BASE_URL:-http://fhir:8092/fhir}
      LLM_API_KEY: ${REALTIME_ANALYSIS_LLM_API_KEY:-}
      LLM_HTTP_REFERER: ${REALTIME_ANALYSIS_LLM_HTTP_REFERER:-}
      LLM_X_TITLE: ${REALTIME_ANALYSIS_LLM_X_TITLE:-MedCoPilot}
      LLM_EXTRA_HEADERS_JSON: ${REALTIME_ANALYSIS_LLM_EXTRA_HEADERS_JSON:-}
      MAX_TOKENS: ${REALTIME_ANALYSIS_MAX_TOKENS:-1024}
      TEMPERATURE: ${REALTIME_ANALYSIS_TEMPERATURE:-0.0}
      LLM_TIMEOUT: ${REALTIME_ANALYSIS_LLM_TIMEOUT:-15.0}
      LLM_REASONING_EFFORT: ${REALTIME_ANALYSIS_LLM_REASONING_EFFORT:-low}
      LOG_LEVEL: ${REALTIME_ANALYSIS_LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  post-session-analytics:
    build:
      context: ./post-session-analytics
    environment:
      POST_ANALYTICS_LLM_BASE_URL: ${POST_ANALYTICS_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      POST_ANALYTICS_MODEL_NAME: ${POST_ANALYTICS_MODEL_NAME:-gpt-oss-120b}
      POST_ANALYTICS_LLM_API_KEY: ${POST_ANALYTICS_LLM_API_KEY:-}
      POST_ANALYTICS_FALLBACK_MODEL_NAMES: ${POST_ANALYTICS_FALLBACK_MODEL_NAMES:-openai/gpt-oss-20b,llama-3.1-8b-instant}
      POST_ANALYTICS_MAX_TOKENS: ${POST_ANALYTICS_MAX_TOKENS:-4096}
      POST_ANALYTICS_TEMPERATURE: ${POST_ANALYTICS_TEMPERATURE:-0.1}
      POST_ANALYTICS_TIMEOUT: ${POST_ANALYTICS_TIMEOUT:-120.0}
      POST_ANALYTICS_LLM_HTTP_REFERER: ${POST_ANALYTICS_LLM_HTTP_REFERER:-}
      POST_ANALYTICS_LLM_X_TITLE: ${POST_ANALYTICS_LLM_X_TITLE:-MedCoPilot}
      POST_ANALYTICS_LLM_EXTRA_HEADERS_JSON: ${POST_ANALYTICS_LLM_EXTRA_HEADERS_JSON:-}
      LOG_LEVEL: ${POST_ANALYTICS_LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  knowledge-extractor:
    build:
      context: ./knowledge-extractor
    depends_on:
      fhir:
        condition: service_started
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${KNOWLEDGE_EXTRACTOR_LOG_LEVEL:-INFO}
      EXTRACTOR_BACKEND: ${KNOWLEDGE_EXTRACTOR_BACKEND:-llm}
      FHIR_BASE_URL: ${KNOWLEDGE_EXTRACTOR_FHIR_BASE_URL:-http://fhir:8092/fhir}
      HTTP_TIMEOUT_SECONDS: ${KNOWLEDGE_EXTRACTOR_HTTP_TIMEOUT_SECONDS:-10}
      FHIR_MAX_RETRIES: ${KNOWLEDGE_EXTRACTOR_FHIR_MAX_RETRIES:-1}
      OLLAMA_BASE_URL: ${KNOWLEDGE_EXTRACTOR_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${KNOWLEDGE_EXTRACTOR_OLLAMA_MODEL:-qwen3:4b-q4_K_M}
      OLLAMA_TIMEOUT_SECONDS: ${KNOWLEDGE_EXTRACTOR_OLLAMA_TIMEOUT_SECONDS:-60}
      OLLAMA_TEMPERATURE: ${KNOWLEDGE_EXTRACTOR_OLLAMA_TEMPERATURE:-0.0}
      LLM_BASE_URL: ${REALTIME_ANALYSIS_LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${REALTIME_ANALYSIS_MODEL_NAME:-openai/gpt-oss-20b}
      LLM_API_KEY: ${REALTIME_ANALYSIS_LLM_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${KNOWLEDGE_EXTRACTOR_LLM_TIMEOUT_SECONDS:-20}
      LLM_MAX_TOKENS: ${KNOWLEDGE_EXTRACTOR_LLM_MAX_TOKENS:-2048}
      LLM_TEMPERATURE: ${KNOWLEDGE_EXTRACTOR_LLM_TEMPERATURE:-0.0}
      LLM_HTTP_REFERER: ${REALTIME_ANALYSIS_LLM_HTTP_REFERER:-}
      LLM_X_TITLE: ${REALTIME_ANALYSIS_LLM_X_TITLE:-MedCoPilot}
      LLM_EXTRA_HEADERS_JSON: ${REALTIME_ANALYSIS_LLM_EXTRA_HEADERS_JSON:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  session-manager:
    build:
      context: ./backend-session-manager
    depends_on:
      clinical-recommendations:
        condition: service_healthy
      transcribation:
        condition: service_healthy
      realtime-analysis:
        condition: service_healthy
      post-session-analytics:
        condition: service_healthy
      knowledge-extractor:
        condition: service_healthy
    environment:
      APP_ENV: container
      HOST: 0.0.0.0
      PORT: 8080
      ASR_PROVIDER: http
      ASR_BASE_URL: http://transcribation:8000
      REALTIME_ANALYSIS_ENABLED: "true"
      REALTIME_ANALYSIS_MODE: http
      REALTIME_ANALYSIS_URL: http://realtime-analysis:8000/v1/assist
      REALTIME_ANALYSIS_LANGUAGE: ${REALTIME_ANALYSIS_LANGUAGE:-ru}
      REALTIME_ANALYSIS_TIMEOUT_SECONDS: ${REALTIME_ANALYSIS_TIMEOUT_SECONDS:-8}
      CLINICAL_RECOMMENDATIONS_ENABLED: "true"
      CLINICAL_RECOMMENDATIONS_URL: http://clinical-recommendations:8002
      CLINICAL_RECOMMENDATIONS_PUBLIC_URL: http://localhost:8080
      CLINICAL_RECOMMENDATIONS_TIMEOUT_SECONDS: 5
      CLINICAL_RECOMMENDATIONS_MIN_CONFIDENCE: 0.6
      KNOWLEDGE_EXTRACTOR_MODE: http
      KNOWLEDGE_EXTRACTOR_ENABLED: "true"
      KNOWLEDGE_EXTRACTOR_URL: http://knowledge-extractor:8000/extract
      KNOWLEDGE_EXTRACTOR_PERSIST_FHIR: "true"
      KNOWLEDGE_EXTRACTOR_SYNC_EHR: "true"
      POST_SESSION_ANALYTICS_ENABLED: "true"
      POST_SESSION_ANALYTICS_MODE: http
      POST_SESSION_ANALYTICS_URL: http://post-session-analytics:8000/analyze
      POST_SESSION_ANALYTICS_TIMEOUT_SECONDS: 180
      FULL_TRANSCRIPTION_TIMEOUT_SECONDS: 300
      HTTP_TIMEOUT_SECONDS: 120
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - session-manager-data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USE_MOCK: "false"
        VITE_SESSION_MANAGER_URL: ""
    depends_on:
      session-manager:
        condition: service_healthy
    environment:
      SESSION_MANAGER_UPSTREAM: http://session-manager:8080
    ports:
      - "3000:80"

volumes:
  fhir-data:
  session-manager-data:
  transcribation-model:
