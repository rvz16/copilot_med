name: medcopilot

services:
  session-manager:
    build:
      context: ./backend-session-manager
    environment:
      APP_ENV: container
      HOST: 0.0.0.0
      PORT: 8080
      ASR_PROVIDER: mock
      KNOWLEDGE_EXTRACTOR_MODE: mock
      KNOWLEDGE_EXTRACTOR_ENABLED: "true"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - session-manager-data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USE_MOCK: "false"
        VITE_SESSION_MANAGER_URL: ""
    depends_on:
      session-manager:
        condition: service_healthy
    environment:
      SESSION_MANAGER_UPSTREAM: http://session-manager:8080
    ports:
      - "3000:80"

volumes:
  session-manager-data:
