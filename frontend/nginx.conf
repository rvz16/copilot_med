server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Use a local resolver so variable-based proxy_pass works.
    # 127.0.0.11 is Docker's embedded DNS; falls back gracefully.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback – serve index.html for any route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Session Manager.
    # Using a variable ($upstream) defers DNS resolution to request time
    # so Nginx can start even when the backend is unreachable.
    location /api/ {
        set $upstream ${SESSION_MANAGER_UPSTREAM};
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /health {
        set $upstream ${SESSION_MANAGER_UPSTREAM};
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
