server:
  port: 8092

spring:
  datasource:
    url: "jdbc:h2:file:/data/hapi/database/hapi;DB_CLOSE_ON_EXIT=FALSE"
    username: sa
    password:
    driverClassName: org.h2.Driver

hapi:
  fhir:
    tester:
      - id: home
        name: Local Tester
        server_address: "http://localhost:8092/fhir"
        refuse_to_fetch_third_party_urls: false
        fhir_version: R4
