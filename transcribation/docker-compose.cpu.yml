services:
  stt:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    environment:
      VAD_THRESHOLD: "0.2"
      VAD_MIN_SPEECH_MS: "200"
      VAD_MIN_SILENCE_MS: "500"
      VAD_PAD_MS: "500"
      USE_GROQ_API: "true"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: "whisper-large-v3-turbo"
      MODEL_PATH: /models/whisper-ct2-ru
      MODEL_KAGGLE_DATASET: danchik575/whisper-ct2-ru
      KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN:-}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - transcribation-model:/models
      - ${HOME}/.kaggle:/root/.kaggle:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    restart: unless-stopped

volumes:
  transcribation-model: