services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  knowledge-extraction-service:
    build: .
    container_name: knowledge-extraction-service
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  ollama:
